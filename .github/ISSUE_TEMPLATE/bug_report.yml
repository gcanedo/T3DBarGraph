name: Bug report
description: Report a reproducible problem in T3DBarGraph
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Open...
        2. Run...
        3. Click...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: delphi-version
    attributes:
      label: Delphi / RAD Studio version
      placeholder: "Example: RAD Studio 12 Athens"
  - type: input
    id: platform
    attributes:
      label: Target platform
      placeholder: "Example: Win32, Win64"
  - type: textarea
    id: media
    attributes:
      label: Screenshots or video
      description: Add visual evidence when the issue is rendering-related.
